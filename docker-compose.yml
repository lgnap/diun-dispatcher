services:
  diun-dispatcher:
    build: .
    # image: ghcr.io/lgnap/diun-dispatcher:latest
    container_name: diun-dispatcher
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      # --- Coolify ---
      COOLIFY_URL: "https://coolify.example.com"
      COOLIFY_TOKEN: "[REDACTED_TOKEN]"

      # --- Notifications via Apprise (comma-separated) ---
      # Pushover  : pover://USER_KEY@APP_TOKEN
      # ntfy      : ntfy://ntfy.example.com/topic
      # Telegram  : tgram://BOTTOKEN/CHATID
      # Gotify    : gotify://hostname/token
      # Discord   : discord://webhook_id/webhook_token
      # Full list : https://github.com/caronc/apprise/wiki
      APPRISE_URLS: "[REDACTED_PUSHOVER_KEY]"

      # --- Optional: shared secret with Diun ---
      WEBHOOK_SECRET: "[REDACTED_SECRET]"

      # --- Dispatcher public URL (for deploy links in notifications) ---
      DISPATCHER_URL: "https://dispatcher.example.com"

    # --- Traefik example (adapt entrypoints to your setup) ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.diun-dispatcher.rule=Host(`diun-dispatcher.example.com`)"
      - "traefik.http.routers.diun-dispatcher.entrypoints=websecure"
      - "traefik.http.routers.diun-dispatcher.tls.certresolver=letsencrypt"
      - "traefik.http.services.diun-dispatcher.loadbalancer.server.port=8000"

    networks:
      - web

networks:
  web:
    external: true
