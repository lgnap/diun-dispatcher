services:
  diun-dispatcher:
    build: .
    # image: ghcr.io/lgnap/diun-dispatcher:latest
    container_name: diun-dispatcher
    restart: unless-stopped
    ports:
      - '8000:8000'
    env_file: .env

    # --- Traefik example (adapt entrypoints to your setup) ---
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.diun-dispatcher.rule=Host(`diun-dispatcher.example.com`)"
      - "traefik.http.routers.diun-dispatcher.entrypoints=websecure"
      - "traefik.http.routers.diun-dispatcher.tls.certresolver=letsencrypt"
      - "traefik.http.services.diun-dispatcher.loadbalancer.server.port=8000"

    networks:
      - web

networks:
  web:
    external: true
