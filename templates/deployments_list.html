{% if deployments %}
<div class="deployments-grid">
    {% for deployment in deployments %}
    <div class="deployment-card">
        <div class="deployment-header">
            <div class="deployment-icon">📦</div>
            <div class="deployment-title">
                <div class="deployment-name">{{ deployment.container_name }}</div>
                <div class="deployment-type">{{ deployment.type }}</div>
            </div>
        </div>

        <div class="deployment-info">
            <div class="deployment-row">
                <span class="deployment-label">🖼️ Image</span>
                <span class="deployment-value image-value">{{ deployment.image }}</span>
            </div>
            <div class="deployment-row">
                <span class="deployment-label">🖥️ Server</span>
                <span class="deployment-value">{{ deployment.hostname }}</span>
            </div>
            <div class="deployment-row">
                <span class="deployment-label">Status</span>
                <span class="status-badge status-available">● Available</span>
            </div>
        </div>

        <div class="deployment-actions">
            <a href="/deploy?uuid={{ deployment.uuid }}&secret=" class="deployment-button deployment-button-primary">
                🚀 Deploy
            </a>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="empty-state">
    <div class="empty-state-icon">🔍</div>
    <div class="empty-state-text">No deployments found matching your search.</div>
</div>
{% endif %}
